version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: crm-solayia-db
    environment:
      POSTGRES_DB: crm_solayia
      POSTGRES_USER: crm_user
      POSTGRES_PASSWORD: crm_password_dev
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U crm_user -d crm_solayia']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
