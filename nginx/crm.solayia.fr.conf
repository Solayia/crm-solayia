server {
    listen 80;
    server_name crm.solayia.fr;

    root /var/www/crm-solayia/frontend/dist;
    index index.html;

    # SPA — toutes les routes renvoient vers index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API — proxy vers Node.js (Express ecoute sans prefixe /api)
    location /api/ {
        proxy_pass http://localhost:4000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Route publique tracking QR (Phase 6)
    location /r/ {
        proxy_pass http://localhost:4000/r/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    client_max_body_size 20M;
}
